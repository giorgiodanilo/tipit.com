<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hint up </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #FF9C5B;
            --bg: #0a0c0e;
            --card-bg: #16181c;
            --text: #e4e6eb;
            --text-dim: #b0b3b8;
            --footer-height: 140px;
        }

        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px 20px calc(var(--footer-height) + 40px) 20px; margin: 0;
            scroll-behavior: smooth;
        }

        .card { 
            background: var(--card-bg); border-radius: 12px; padding: 20px; 
            width: 100%; max-width: 420px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            margin-bottom: 20px; border: 1px solid #2d3136;
        }

        h3 { margin: 0 0 15px 0; color: var(--accent); font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; }
        .status-online { font-size: 0.7rem; color: #4ade80; display: flex; align-items: center; gap: 4px; }

        input, textarea { 
            width: 100%; background: #24282d; border: 1px solid #3e444b; 
            color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px;
            box-sizing: border-box; font-size: 14px; outline: none; transition: border 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--accent); }

        .main-btn { 
            width: 100%; background: var(--accent); color: #000; border: none; 
            padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.2s;
        }
        .main-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .main-btn:disabled { background: #555; cursor: not-allowed; }

        /* Estilo de la Colección de Feed */
        .feed-collection { width: 100%; max-width: 420px; }
        .mensaje-recibido { 
            background: var(--card-bg); border: 1px solid #2d3136; padding: 15px; 
            border-radius: 12px; margin-bottom: 10px; animation: slideIn 0.3s ease;
            border-left: 3px solid transparent; transition: border-left 0.3s;
        }
        .mensaje-recibido:hover { border-left: 3px solid var(--accent); }
        .username { font-weight: bold; color: var(--accent); font-size: 13px; }
        .text-content { font-size: 14px; margin-top: 5px; line-height: 1.4; color: var(--text); }
        
        /* Footer Fijo */
        footer {
            position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1d21;
            border-top: 2px solid var(--accent); padding: 15px 0; display: flex;
            justify-content: center; z-index: 1000;
        }
        .footer-content { width: 100%; max-width: 420px; display: flex; align-items: center; gap: 15px; padding: 0 20px; }
        .qr-mini { background: white; padding: 5px; border-radius: 4px; flex-shrink: 0; }
        .btc-address { 
            font-family: monospace; font-size: 10px; color: var(--text-dim);
            background: #000; padding: 5px; border-radius: 4px; display: block;
            margin: 4px 0; overflow: hidden; text-overflow: ellipsis;
        }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

    <div class="card">
        <h3>Hint up <span class="status-online">● Global Collection</span></h3>
        <input type="text" id="nombre" placeholder="Username...">
        <textarea id="texto" placeholder="Share a hint with the world..." rows="2"></textarea>
        <button onclick="enviarMensaje()" class="main-btn" id="btnSend">SEND TO FEED</button>
    </div>

    <div class="feed-collection">
        <h3 style="color: var(--text-dim); font-size: 0.9rem; margin-left: 5px;">Live Community Feed</h3>
        <div id="contenedor-mensajes">
            <p style="text-align:center; color: var(--text-dim);">Loading global feed...</p>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="qr-mini" id="qrcode"></div>
            <div style="flex-grow: 1;">
                <div style="color: var(--accent); font-weight: bold; font-size: 0.8rem;">₿ BITCOIN TIP JAR</div>
