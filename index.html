<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip it</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --accent: #FF9C5B;
            --bg: #0a0c0e;
            --card-bg: #16181c;
            --text: #e4e6eb;
            --text-dim: #b0b3b8;
            --footer-height: 180px; /* Espacio para el footer */
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px 20px calc(var(--footer-height) + 40px) 20px;
            margin: 0;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 20px; 
            width: 100%; 
            max-width: 420px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            margin-bottom: 20px;
            border: 1px solid #2d3136;
        }

        h3 { margin: 0 0 15px 0; color: var(--accent); font-size: 1.1rem; }

        input, textarea { 
            width: 100%; background: #24282d; border: 1px solid #3e444b; 
            color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px;
            box-sizing: border-box; font-size: 14px;
        }

        .main-btn { 
            width: 100%; background: var(--accent); color: #000; border: none; 
            padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 700; 
        }

        /* --- ESTILO FOOTER DE DONACIÓN --- */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #1a1d21;
            border-top: 2px solid var(--accent);
            padding: 15px 0;
            display: flex;
            justify-content: center;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .footer-content {
            width: 100%;
            max-width: 420px;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 0 20px;
        }

        .qr-mini { 
            background: white; 
            padding: 5px; 
            border-radius: 4px; 
            flex-shrink: 0;
        }

        .btc-info { flex-grow: 1; }
        .btc-label { color: var(--accent); font-weight: bold; font-size: 0.8rem; margin-bottom: 4px; }
        .btc-address { 
            font-family: monospace; font-size: 10px; color: var(--text-dim);
            background: #000; padding: 5px; border-radius: 4px; display: block;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        .btn-copy-mini {
            background: #333; color: white; border: none; padding: 8px 12px;
            border-radius: 6px; font-size: 11px; cursor: pointer; white-space: nowrap;
        }

        /* Mensajes */
        .mensaje-recibido { 
            background: var(--card-bg); border: 1px solid #2d3136; padding: 15px; 
            border-radius: 12px; margin-bottom: 10px; animation: fadeIn 0.4s ease;
        }
        .username { font-weight: bold; color: var(--accent); font-size: 13px; }
        .text-content { font-size: 14px; margin-top: 5px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyDd0lxWG6r4xY7bo_Vo6UUFaT_y5ASZo8E",
    authDomain: "tipit-15c2f.firebaseapp.com",
    projectId: "tipit-15c2f",
    storageBucket: "tipit-15c2f.firebasestorage.app",
    messagingSenderId: "829749900187",
    appId: "1:829749900187:web:ad6665faed85ceea9a673e",
    measurementId: "G-TP42YNFR8G"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
</script>
    <div class="card">
        <h3>Hint the law</h3>
        <input type="text" id="nombre" placeholder="Username...">
        <textarea id="texto" placeholder="Tip it..." rows="2"></textarea>
        <button onclick="nuevoMensaje()" class="main-btn">SEND MESSAGE</button>
    </div>

    <div style="width: 100%; max-width: 420px;">
        <h3 style="color: var(--text-dim); font-size: 0.9rem;">Recent Activity</h3>
        <div id="contenedor-mensajes"></div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="qr-mini" id="qrcode"></div>
            <div class="btc-info">
                <div class="btc-label">₿ SUPPORT PROJECT</div>
                <code class="btc-address" id="btcAddr">13AC5v6q2UwWcaKUSxRLU5HJ9Lj2NoChFm</code>
                <button class="btn-copy-mini" id="copyBtn" onclick="copyAddress()">COPY ADDRESS</button>
            </div>
        </div>
    </footer>

    <script>
        let mensajes = JSON.parse(localStorage.getItem('tipit_footer_data')) || [];

        // QR ajustado al footer
        new QRCode(document.getElementById("qrcode"), {
            text: "bitcoin:13AC5v6q2UwWcaKUSxRLU5HJ9Lj2NoChFm",
            width: 60,
            height: 60
        });

        function renderizar() {
            const container = document.getElementById('contenedor-mensajes');
            container.innerHTML = '';
            [...mensajes].reverse().forEach((m, index) => {
                const realIndex = mensajes.length - 1 - index;
                container.innerHTML += `
                    <div class="mensaje-recibido">
                        <div class="username">@${m.nombre}</div>
                        <div class="text-content">${m.texto}</div>
                        <div style="text-align: right; margin-top: 8px;">
                            <button style="background:none; border:1px solid #333; color:#888; border-radius:15px; padding:2px 10px; font-size:11px; cursor:pointer;" onclick="interactuar(${realIndex})">
                                👍 ${m.interacciones}
                            </button>
                        </div>
                    </div>
                `;
            });
            localStorage.setItem('tipit_footer_data', JSON.stringify(mensajes));
        }

        function nuevoMensaje() {
            const nombre = document.getElementById('nombre').value;
            const texto = document.getElementById('texto').value;
            if (nombre && texto) {
                mensajes.push({ nombre, texto, interacciones: 0, id: Date.now() });
                document.getElementById('nombre').value = '';
                document.getElementById('texto').value = '';
                renderizar();
            }
        }

        function interactuar(index) {
            mensajes[index].interacciones++;
            renderizar();
        }

        function copyAddress() {
            const addr = document.getElementById('btcAddr').innerText;
            const btn = document.getElementById('copyBtn');
            navigator.clipboard.writeText(addr).then(() => {
                btn.innerText = "COPIED!";
                setTimeout(() => { btn.innerText = "COPY ADDRESS"; }, 2000);
            });
        }

        renderizar();
    </script>
</body>
</html>
