<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hint up</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --accent: #FF9C5B;
            --bg: #0f1113;
            --card-bg: #1a1d21;
            --text: #e4e6eb;
            --text-dim: #b0b3b8;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            margin: 0;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 24px; 
            width: 100%; 
            max-width: 420px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.5); 
            margin-bottom: 20px;
            border: 1px solid #2d3136;
        }

        h3 { margin: 0 0 15px 0; font-weight: 600; letter-spacing: -0.5px; display: flex; align-items: center; justify-content: space-between; }
        h3 span { color: var(--accent); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        input, textarea { 
            width: 100%; background: #24282d; border: 1px solid #3e444b; 
            color: white; padding: 12px; border-radius: 8px; margin-bottom: 12px;
            box-sizing: border-box; font-size: 14px; transition: border 0.3s;
        }

        input:focus, textarea:focus { border-color: var(--accent); outline: none; }

        .main-btn { 
            width: 100%; background: var(--accent); color: #000; border: none; 
            padding: 14px; border-radius: 8px; cursor: pointer; font-weight: 700; 
            font-size: 15px; transition: transform 0.2s, opacity 0.2s;
        }

        .main-btn:active { transform: scale(0.98); }

        /* Estilo Donación Realista */
        .donation-card { border-left: 4px solid var(--accent); }
        .btc-label { color: var(--accent); font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .qr-container { background: white; padding: 10px; border-radius: 8px; width: fit-content; margin: 15px auto; }
        .btc-address { 
            background: #000; padding: 12px; border-radius: 6px; font-family: 'Courier New', monospace;
            font-size: 11px; word-break: break-all; border: 1px dashed #444; color: var(--accent);
            display: block; text-align: center; margin-bottom: 10px;
        }

        /* Mensajes Estilo Timeline */
        .mensaje-recibido { 
            background: var(--card-bg); border: 1px solid #2d3136; padding: 16px; 
            border-radius: 12px; margin-bottom: 12px; display: flex; flex-direction: column;
            animation: fadeIn 0.4s ease forwards;
        }

        .meta-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .username { font-weight: bold; color: var(--accent); }
        .time { font-size: 11px; color: var(--text-dim); }
        .text-content { font-size: 14px; line-height: 1.5; color: var(--text); }
        
        .interaction-row { display: flex; justify-content: flex-end; margin-top: 10px; }
        .btn-like { 
            background: transparent; border: 1px solid #3e444b; color: var(--text-dim); 
            padding: 4px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; transition: 0.3s;
        }
        .btn-like:hover { border-color: var(--accent); color: var(--accent); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <script>// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDr4RconZK8Aqy0kepmu2mmaTudZeBATvg",
  authDomain: "hintup2.firebaseapp.com",
  projectId: "hintup2",
  storageBucket: "hintup2.firebasestorage.app",
  messagingSenderId: "933642470863",
  appId: "1:933642470863:web:85db750c00198cacde7eba",
  measurementId: "G-XHK5W8QS4E"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
function enviarComentario() {
    const user = document.getElementById('username').value;
    const msg = document.getElementById('message').value;

    if(user && msg) {
      db.ref('feed').push({
        username: user,
        text: msg,
        timestamp: Date.now() // Esto asegura el orden cronológico
      });
      document.getElementById('message').value = ''; // Limpiar campo
    }
  }

  // --- FUNCIÓN PARA VISUALIZAR EL FEED EN TIEMPO REAL ---
  // Este método se queda "escuchando" cambios globalmente
  db.ref('feed').orderByChild('timestamp').limitToLast(50).on('value', (snapshot) => {
    const feedContainer = document.getElementById('feed-container');
    feedContainer.innerHTML = ''; // Limpiar para actualizar
    
    const data = snapshot.val();
    if(data) {
      // Convertir a array y revertir para ver lo más nuevo arriba
      Object.keys(data).reverse().forEach(key => {
        const item = data[key];
        feedContainer.innerHTML += `
          <div class="post">
            <strong>@${item.username}</strong>
            <p>${item.text}</p>
          </div>
        `;
      });
    }
  });
</script>
    <div class="card">
        <h3>Tip it <span>Presidential Edition</span></h3>
        <input type="text" id="nombre" placeholder="Username...">
        <textarea id="texto" placeholder="Write something meaningful..." rows="3"></textarea>
        <button onclick="nuevoMensaje()" class="main-btn">POST MESSAGE</button>
    </div>

    <div class="card donation-card">
        <div class="btc-label">₿ BITCOIN DONATION</div>
        <p style="font-size: 12px; color: var(--text-dim); margin: 0;">Scan or copy the address to support development.</p>
        
        <div class="qr-container" id="qrcode"></div>
        
        <code class="btc-address" id="btcAddr">13AC5v6q2UwWcaKUSxRLU5HJ9Lj2NoChFm</code>
        <button class="main-btn" style="background: #24282d; color: white; padding: 10px;" id="copyBtn" onclick="copyAddress()">Copy Address</button>
    </div>

    <div style="width: 100%; max-width: 420px;">
        <h3 style="color: var(--text-dim); font-size: 1rem;">Community Feed</h3>
        <div id="contenedor-mensajes"></div>
    </div>

    <script>
        let mensajes = JSON.parse(localStorage.getItem('tipit_pro_data')) || [];

        // Generar QR automáticamente
        new QRCode(document.getElementById("qrcode"), {
            text: "bitcoin:13AC5v6q2UwWcaKUSxRLU5HJ9Lj2NoChFm",
            width: 128,
            height: 128,
            colorDark : "#000000",
            colorLight : "#ffffff"
        });

        function renderizar() {
            const container = document.getElementById('contenedor-mensajes');
            container.innerHTML = '';
            [...mensajes].reverse().forEach((m, index) => {
                const realIndex = mensajes.length - 1 - index;
                const timeAgo = Math.floor((Date.now() - m.id) / 60000);
                const timeLabel = timeAgo < 1 ? 'Just now' : `Hace ${timeAgo} min`;

                container.innerHTML += `
                    <div class="mensaje-recibido">
                        <div class="meta-info">
                            <span class="username">@${m.nombre}</span>
                            <span class="time">${timeLabel}</span>
                        </div>
                        <div class="text-content">${m.texto}</div>
                        <div class="interaction-row">
                            <button class="btn-like" onclick="interactuar(${realIndex})">
                                👍 ${m.interacciones}
                            </button>
                        </div>
                    </div>
                `;
            });
            localStorage.setItem('tipit_pro_data', JSON.stringify(mensajes));
        }

        function nuevoMensaje() {
            const nombre = document.getElementById('nombre').value;
            const texto = document.getElementById('texto').value;
            if (nombre && texto) {
                mensajes.push({ nombre, texto, interacciones: 0, id: Date.now() });
                document.getElementById('nombre').value = '';
                document.getElementById('texto').value = '';
                renderizar();
            }
        }

        function interactuar(index) {
            mensajes[index].interacciones++;
            renderizar();
        }

        function copyAddress() {
            const addr = document.getElementById('btcAddr').innerText;
            const btn = document.getElementById('copyBtn');
            navigator.clipboard.writeText(addr).then(() => {
                const originalText = btn.innerText;
                btn.innerText = "COPIED! ✓";
                btn.style.color = "var(--accent)";
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.color = "white";
                }, 2000);
            });
        }

        renderizar();
        // Auto-actualizar tiempos cada minuto
        setInterval(renderizar, 60000);
    </script>
</body>
</html>
