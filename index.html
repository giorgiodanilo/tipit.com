<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip it // Global Presidential</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #FF9C5B;
            --bg: #0a0c0e;
            --card-bg: #16181c;
            --text: #e4e6eb;
            --text-dim: #b0b3b8;
            --footer-height: 140px;
        }

        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px 20px calc(var(--footer-height) + 40px) 20px; margin: 0;
        }

        .card { 
            background: var(--card-bg); border-radius: 12px; padding: 20px; 
            width: 100%; max-width: 420px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            margin-bottom: 20px; border: 1px solid #2d3136;
        }

        h3 { margin: 0 0 15px 0; color: var(--accent); font-size: 1.1rem; display: flex; justify-content: space-between; }
        .status-online { font-size: 0.7rem; color: #4ade80; display: flex; align-items: center; gap: 4px; }

        input, textarea { 
            width: 100%; background: #24282d; border: 1px solid #3e444b; 
            color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px;
            box-sizing: border-box; font-size: 14px; outline: none;
        }
        input:focus { border-color: var(--accent); }

        .main-btn { 
            width: 100%; background: var(--accent); color: #000; border: none; 
            padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.2s;
        }
        .main-btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Footer Fijo */
        footer {
            position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1d21;
            border-top: 2px solid var(--accent); padding: 15px 0; display: flex;
            justify-content: center; z-index: 1000;
        }
        .footer-content { width: 100%; max-width: 420px; display: flex; align-items: center; gap: 15px; padding: 0 20px; }
        .qr-mini { background: white; padding: 5px; border-radius: 4px; }

        .btc-address { 
            font-family: monospace; font-size: 10px; color: var(--text-dim);
            background: #000; padding: 5px; border-radius: 4px; display: block;
            margin: 4px 0; overflow: hidden; text-overflow: ellipsis;
        }

        /* Mensajes Públicos */
        .mensaje-recibido { 
            background: var(--card-bg); border: 1px solid #2d3136; padding: 15px; 
            border-radius: 12px; margin-bottom: 10px; animation: slideIn 0.3s ease;
        }
        .username { font-weight: bold; color: var(--accent); font-size: 13px; }
        .text-content { font-size: 14px; margin-top: 5px; line-height: 1.4; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div class="card">
        <h3>Presidential Post <span class="status-online">● Live Global</span></h3>
        <input type="text" id="nombre" placeholder="Tu apodo...">
        <textarea id="texto" placeholder="Escribe un mensaje para el mundo..." rows="2"></textarea>
        <button onclick="enviarMensaje()" class="main-btn" id="btnSend">PUBLICAR</button>
    </div>

    <div style="width: 100%; max-width: 420px;">
        <h3 style="color: var(--text-dim); font-size: 0.9rem;">Global Activity</h3>
        <div id="contenedor-mensajes">
            <p style="text-align:center; color: var(--text-dim);">Conectando con el servidor...</p>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="qr-mini" id="qrcode"></div>
            <div style="flex-grow: 1;">
                <div style="color: var(--accent); font-weight: bold; font-size: 0.8rem;">₿ BITCOIN TIP JAR</div>
                <code class="btc-address">13AC5v6q2UwWcaKUSxRLU5HJ9Lj2NoChFm</code>
                <button style="background: #333; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 10px; cursor: pointer;" onclick="copyAddress()">COPY BTC</button>
            </div>
        </div>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDd0lxWG6r4xY7bo_Vo6UUFaT_y5ASZo8E",
            authDomain: "tipit-15c2f.firebaseapp.com",
            projectId: "tipit-15c2f",
            storageBucket: "tipit-15c2f.firebasestorage.app",
            messagingSenderId: "829749900187",
            appId: "1:829749900187:web:ad6665faed85ceea9a673e",
            measurementId: "G-TP42YNFR8G"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Generar QR
        new QRCode(document.getElementById("qrcode"), {
            text: "bitcoin:13AC5v6q2UwWcaKUSxRLU5HJ9Lj2NoChFm",
            width: 50, height: 50
        });

        // ESCUCHAR MENSAJES EN TIEMPO REAL
        db.ref('mensajes').limitToLast(50).on('value', (snapshot) => {
            const container = document.getElementById('contenedor-mensajes');
            container.innerHTML = '';
            const data = snapshot.val();
            
            if (data) {
                // Convertir objeto a array y voltear para ver los nuevos arriba
                Object.keys(data).reverse().forEach(key => {
                    const m = data[key];
                    container.innerHTML += `
                        <div class="mensaje-recibido">
                            <div class="username">@${m.nombre}</div>
                            <div class="text-content">${m.texto}</div>
                            <div style="text-align: right; margin-top: 8px;">
                                <button style="background:none; border:1px solid #333; color:#888; border-radius:15px; padding:2px 10px; font-size:11px; cursor:pointer;" onclick="darLike('${key}', ${m.likes || 0})">
                                    👍 ${m.likes || 0}
                                </button>
                            </div>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = '<p style="text-align:center; color: var(--text-dim);">No hay mensajes globales aún.</p>';
            }
        });

        // ENVIAR A LA NUBE
        function enviarMensaje() {
            const nombre = document.getElementById('nombre').value;
            const texto = document.getElementById('texto').value;
            
            if (nombre && texto) {
                db.ref('mensajes').push({
                    nombre: nombre,
                    texto: texto,
                    likes: 0,
                    timestamp: Date.now()
                });
                document.getElementById('texto').value = '';
            }
        }

        // LIKES GLOBALES
        function darLike(id, currentLikes) {
            db.ref('mensajes/' + id).update({
                likes: currentLikes + 1
            });
        }

        function copyAddress() {
            navigator.clipboard.writeText("13AC5v6q2UwWcaKUSxRLU5HJ9Lj2NoChFm");
            alert("BTC Address Copied!");
        }
    </script>
</body>
</html>
